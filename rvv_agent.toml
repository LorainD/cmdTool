# rvv-agent configuration

# --- LLM 配置 ---
# base_url 填写 OpenAI-compatible 服务的 base URL（不需要加 /chat/completions，会自动补全）。
# 常见示例：
#   OpenAI 官方:    "https://api.openai.com/v1"
#   Azure OpenAI:   "https://<resource>.openai.azure.com/openai/deployments/<deploy>"
#   本地 Ollama:    "http://localhost:11434/v1"
#   其他兼容服务:   "https://your-service.example.com/v1"
#
# api_key_env: 存放 API Key 的环境变量名（不要直接写 Key）
[llm]
base_url    = "https://chatbox.isrc.ac.cn/api/chat/completions"
model       = "gpt-5.2"
api_key_env = "LLM_API_KEY"
temperature = 0.2

[toolchain]
cross_prefix = "riscv64-unknown-linux-gnu-"
arch = "riscv64"
target_os = "linux"
cpu = "rv64gcv"
extra_cflags = "-march=rv64gcv -mabi=lp64d -O3"
extra_ldflags = "-static"
# Prepend this directory to PATH so the RISC-V cross-compiler is found in subprocesses.
extra_path = "/home/yuhe/project/local/riscv/bin"

[ffmpeg]
root = "workplace/FFmpeg"
build_dir = "build"
# configure_path = "./configure"
# configure_extra_args = ["--disable-everything"]

[board]
enabled = false
user = ""
host = ""
port = 22
remote_dir = "workplace"
